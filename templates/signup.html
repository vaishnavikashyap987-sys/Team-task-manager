<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d") no-repeat center center fixed;
    background-size: cover;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(255, 192, 203, 0.4);
}

.card-box {
    position: relative;
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 20px;
    width: 360px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
}

h2 {
    color: #ff4d88;
    font-weight: 800;
}

input {
    border-radius: 10px;
}

.btn-pink {
    background: #ff4d88;
    color: white;
    border-radius: 10px;
}
.btn-pink:hover {
    background: #e6005c;
}

a {
    color: #ff4d88;
    font-weight: bold;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card-box">
    <i class="fa-solid fa-user-plus fa-2x"></i>
    <h2>Sign Up</h2>

    <form method="POST">
        <input class="form-control mb-2" name="username" placeholder="Username" required>
        <input class="form-control mb-2" type="password" name="password" placeholder="Password" required>

        <button class="btn btn-pink w-100">Create Account</button>
    </form>

    <p class="mt-3">Already have account? <a href="/login">Login</a></p>
</div>

</body>
</html>
