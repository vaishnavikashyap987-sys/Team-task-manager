<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Team Task Manager</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #fce4ec);
        }

        .navbar {
            background: #1e3a8a;
        }

        .navbar-brand {
            color: white !important;
            font-weight: 700;
        }

        .hero {
            padding: 40px;
            text-align: center;
        }

        .hero img {
            width: 180px;
            margin-bottom: 15px;
        }

        .task-card {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 20px;
            background: white;
            transition: 0.3s;
        }

        .task-card:hover {
            transform: scale(1.03);
        }

        .btn-custom {
            background: #1e3a8a;
            color: white;
            border-radius: 10px;
        }

        .btn-custom:hover {
            background: #0f172a;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#">🚀 Team Task Manager</a>
    </div>
</nav>

<!-- Hero Section -->
<div class="hero">
    <img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png" alt="task">
    <h2>Manage Your Team Tasks Smartly</h2>
    <p>Simple | Fast | Organized</p>
</div>

<!-- Task Form -->
<div class="container">
    <div class="task-card mb-4">
        <h4>Add New Task</h4>
        <form method="POST" action="/add">
            <input type="text" name="task" class="form-control mb-2" placeholder="Enter task..." required>
            <button class="btn btn-custom w-100">Add Task</button>
        </form>
    </div>

    <!-- Task List -->
    <div class="task-card">
        <h4>📋 Task List</h4>
        <ul class="list-group mt-3">
            {% for task in tasks %}
                <li class="list-group-item d-flex justify-content-between">
                    {{ task }}
                    <a href="/delete/{{ loop.index0 }}" class="btn btn-sm btn-danger">Delete</a>
                </li>
            {% endfor %}
        </ul>
    </div>
</div>

</body>
</html>
