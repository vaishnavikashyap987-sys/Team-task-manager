<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f") no-repeat center center fixed;
    background-size: cover;
    font-family: Arial Black;
}

.card {
    width: 350px;
    margin: auto;
    margin-top: 120px;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 20px;
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="card text-center">
<h3>LOGIN</h3>
<form method="POST">
<input class="form-control mb-2" name="username" placeholder="USERNAME">
<input class="form-control mb-2" name="password" type="password" placeholder="PASSWORD">
<button class="btn btn-primary w-100">LOGIN</button>
</form>

<p><a href="/signup">Signup</a></p>
</div>

</body>
</html>
